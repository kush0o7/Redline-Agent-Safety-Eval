services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: redline
      POSTGRES_PASSWORD: redline
      POSTGRES_DB: redline
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis
    command: ["sh", "-c", "alembic -c app/db/alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: ["python", "-m", "arq", "app.queue.worker.WorkerSettings"]

volumes:
  pgdata:
