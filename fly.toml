app = "redline-safety"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8000"
  # All secrets go via: fly secrets set KEY=value  (never commit real keys here)

[processes]
  app = "/app/start.sh"

[http_service]
  internal_port     = 8000
  force_https       = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  processes = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
