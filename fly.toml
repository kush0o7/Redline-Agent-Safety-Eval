app = "redline-safety"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8000"
  # All secrets go via: fly secrets set KEY=value  (never commit real keys here)

[processes]
  app = "sh -c 'alembic -c app/db/alembic.ini upgrade head && python -m arq app.queue.worker.WorkerSettings & uvicorn app.main:app --host 0.0.0.0 --port 8000'"

[http_service]
  internal_port     = 8000
  force_https       = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  processes = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
