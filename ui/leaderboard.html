<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redline — Safety Leaderboard</title>
    <link rel="stylesheet" href="/ui/styles.css" />
    <style>
      .lb-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
      .lb-table th { text-align: left; color: var(--muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; padding: 0 12px 10px; }
      .lb-table td { padding: 12px; border-top: 1px solid var(--border); font-size: 15px; }
      .lb-table tr:hover td { background: rgba(255,255,255,.03); }
      .rank { color: var(--muted); font-size: 13px; width: 36px; }
      .model-name { font-weight: 600; }
      .pct { font-size: 20px; font-weight: 700; color: var(--accent); }
      .tier-chip { font-size: 12px; background: rgba(255,255,255,.07); border-radius: 6px; padding: 3px 8px; }
      .date { color: var(--muted); font-size: 13px; }
      .empty { color: var(--muted); padding: 32px 0; text-align: center; }
      .back-link { display: inline-block; margin-bottom: 24px; color: var(--accent); text-decoration: none; font-size: 14px; }
      .back-link:hover { text-decoration: underline; }
      .run-cta { margin-top: 28px; text-align: center; }
    </style>
  </head>
  <body>
    <main class="container">
      <nav style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
        <a href="/ui/" style="color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;">Evaluate</a>
        <a href="/ui/leaderboard.html" style="color:var(--accent);text-decoration:none;font-size:14px;font-weight:500;">Leaderboard</a>
        <a href="/ui/methodology.html" style="color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;">Methodology</a>
      </nav>
      <header>
        <h1>Redline <span class="header-tag">Leaderboard</span></h1>
        <p class="subtitle">Best safety score per model across all completed evals.</p>
      </header>

      <section class="card">
        <table class="lb-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Model</th>
              <th>Score</th>
              <th>Tier</th>
              <th>Cases</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="lbBody">
            <tr><td colspan="6" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </section>

      <div class="run-cta">
        <a href="/ui/" class="btn-primary" style="display:inline-block;padding:12px 28px;border-radius:8px;background:#3ddc97;color:#0f131a;font-weight:700;text-decoration:none;">Test your model →</a>
      </div>
    </main>

    <script>
      function esc(s) {
        return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }
      async function loadLeaderboard() {
        const resp = await fetch("/leaderboard");
        if (!resp.ok) { document.getElementById("lbBody").innerHTML = '<tr><td colspan="6" class="empty">Failed to load.</td></tr>'; return; }
        const { entries } = await resp.json();
        if (!entries || entries.length === 0) {
          document.getElementById("lbBody").innerHTML = '<tr><td colspan="6" class="empty">No evals yet — <a href="/ui/" style="color:var(--accent)">be the first</a>.</td></tr>';
          return;
        }
        document.getElementById("lbBody").innerHTML = entries.map(e => `
          <tr>
            <td class="rank">${esc(e.rank)}</td>
            <td class="model-name">${esc(e.model)}${e.custom_endpoint ? ' <span title="Run against a user-supplied endpoint — model name is self-reported" style="font-size:11px;opacity:.7">⚠️ unverified</span>' : ""}<div style="font-size:12px;color:var(--muted)">by ${esc(e.submitter||"anonymous")}</div></td>
            <td class="pct">${esc(e.pass_pct)}%</td>
            <td><span class="tier-chip">${esc(e.tier || "—")}</span></td>
            <td class="date">${esc(e.testcase_count ?? "—")}</td>
            <td class="date">${esc(e.date || "—")}</td>
          </tr>
        `).join("");
      }
      loadLeaderboard();
    </script>
  </body>
</html>
